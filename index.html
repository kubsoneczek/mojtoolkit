<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRLToolkit • Dashboard</title>
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAARElEQVR42mNkQAIsb7qYgYgBwre96mYgRAsDQEAsgInBAsgGoID9YAEwAIsBMA0wAIsBMA0wAIsBMA0wAIsBMA3wAIsB0A0An9idZ6Zbe9IAAAAASUVORK5CYII=">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1a1d20;
            color: #ffffff;
            font-size: 14px;
        }

        /* GÓRNY PASEK NAWIGACJI */
        .navbar {
            background-color: #24282c;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2d3238;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }

        .brand-logo span {
            background-color: #dc3545;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-item {
            color: #b9bbbe;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            color: #ffffff;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 13px;
            color: #b9bbbe;
        }

        .status-server {
            color: #ffc107;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .logout-link {
            color: #dc3545;
            text-decoration: none;
        }

        /* GŁÓWNY UKŁAD GRID */
        .dashboard-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .panel {
            background-color: #24282c;
            border-radius: 6px;
            border: 1px solid #2d3238;
            padding: 15px;
        }

        .col-4 { grid-column: span 4; }
        .col-5 { grid-column: span 5; }
        .col-7 { grid-column: span 7; }

        .panel-title {
            font-size: 13px;
            color: #b9bbbe;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* PRZYCISKI I KONTROLKI */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-align: center;
        }

        .btn-start { background-color: #2ca045; }
        .btn-stop { background-color: #dc3545; }

        .btn-mute { background-color: #007bff; }
        .btn-fix { background-color: #ffc107; color: #000; }

        .ingest-row {
            margin-bottom: 15px;
        }
        .ingest-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #b9bbbe;
            margin-bottom: 4px;
        }
        .ingest-status { color: #dc3545; font-weight: bold; }
        .ingest-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 60px;
            gap: 6px;
        }
        .ingest-actions .btn { padding: 8px; font-size: 13px; }

        /* SCENY */
        .scene-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .scene-btn {
            background-color: #1a1d20;
            color: #ffffff;
            border: 1px solid #2d3238;
            padding: 10px;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .scene-btn.active {
            background-color: #2ca045;
            border-color: #2ca045;
        }

        /* PODGLĄD WIDEO */
        .video-preview {
            background-color: #1a1d20;
            aspect-ratio: 16/9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            border: 1px solid #2d3238;
        }

        .preview-logo {
            font-size: 48px;
            font-weight: bold;
            color: #dc3545;
            margin-bottom: 10px;
        }

        .preview-text {
            color: #b9bbbe;
            font-size: 20px;
            font-weight: bold;
        }

        /* WYKRES STRUMIENIA */
        .chart-placeholder {
            background-color: #1a1d20;
            height: 100%;
            min-height: 250px;
            border: 1px solid #2d3238;
            border-radius: 4px;
            position: relative;
            padding: 10px;
        }

        .chart-line {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            border-bottom: 2px solid #dc3545;
        }
        .chart-label {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #dc3545;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }

        /* DOLNY STATUS BAR */
        .statusbar {
            background-color: #1a1d20;
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 6px 20px;
            display: flex;
            gap: 15px;
            font-size: 12px;
            border-top: 1px solid #2d3238;
        }

        .status-badge {
            background-color: #dc3545;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="#" class="brand-logo"><span>IRL</span> Kubson</a>
            <div class="nav-links">
                <a href="#" class="nav-item active">Dashboard</a>
                <a href="#" class="nav-item">OBS</a>
                <div style="display:inline-block; position:relative;">
                    <a href="#" class="nav-item">Settings ▾</a>
                </div>
                <a href="https://kubsoneczek.github.io/irltoolkit/belabox.html" class="nav-item" style="color: #2ca045; font-weight: bold; border-left: 1px solid #2d3238; padding-left: 15px;">BELABOX</a>
            </div>
        </div>
        <div class="nav-right">
            <span>No destination set</span>
            <span>Language ▾</span>
            <div class="status-server">⚠️ Shutdown server</div>
            <a href="#" class="logout-link">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <div class="panel col-4">
            <div class="panel-title">Stream ▾</div>
            <div class="btn-group">
                <button class="btn btn-start">🎥 Start</button>
                <button class="btn btn-stop">🛑 Stop</button>
            </div>
        </div>

        <div class="panel col-4">
            <div class="panel-title">Ingest ▾</div>
            
            <div class="ingest-row">
                <div class="ingest-header">
                    <span>Main Ingest</span>
                    <span class="ingest-status">Offline</span>
                </div>
                <div class="ingest-actions">
                    <button class="btn btn-mute">🎙️ Mute</button>
                    <button class="btn btn-mute">🔊 Unmute</button>
                    <button class="btn btn-fix">🔧 Fix</button>
                </div>
            </div>

            <div class="ingest-row">
                <div class="ingest-header">
                    <span>Second Ingest</span>
                    <span class="ingest-status">Offline</span>
                </div>
                <div class="ingest-actions">
                    <button class="btn btn-mute">🎙️ Mute</button>
                    <button class="btn btn-mute">🔊 Unmute</button>
                    <button class="btn btn-fix">🔧 Fix</button>
                </div>
            </div>
        </div>

        <div class="panel col-4">
            <div class="panel-title">Scene ▾</div>
            <div class="scene-list">
                <button class="scene-btn">🖼️ Starting Soon</button>
                <button class="scene-btn">🖼️ BRB</button>
                <button class="scene-btn">☁️ Ingest</button>
                <button class="scene-btn">📉 Ingest Low-bitrate</button>
                <button class="scene-btn">✔️ Ingest Offline</button>
                <button class="scene-btn active">🟢 Second Ingest</button>
            </div>
        </div>

        <div class="panel col-5">
            <div class="panel-title">Ingest Preview real-time ▾</div>
            <div class="video-preview">
                <div class="preview-logo">IRL</div>
                <div class="preview-text">Ingest Currently Offline</div>
            </div>
        </div>

        <div class="panel col-7">
            <div class="panel-title">Ingest Bitrate past 60 sec ▾</div>
            <div class="chart-placeholder">
                <div class="chart-line"></div>
                <div class="chart-label">Offline</div>
            </div>
        </div>

    </div>

    <div class="statusbar">
        <div><span class="status-badge">Stream Offline</span></div>
        <div><span class="status-badge">Main Ingest Offline</span></div>
    </div>

</body>
</html>
